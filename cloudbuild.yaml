steps:
  - name: "node:20"
    entrypoint: "npm"
    args: ["ci"]

  - name: "node:20"
    entrypoint: "npm"
    args: ["run", "build"]

  - name: "us-docker.pkg.dev/firebase-cli/us/firebase"
    args:
      - "deploy"
      - "--project=harborforge-412b3"
      - "--only=hosting"

timeout: "1200s"
